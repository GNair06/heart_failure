<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — HeartCare</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:500px">
    <div class="auth-logo">
      <div class="logo-circle"></div>
      <h1>HeartCare</h1>
      <p>Heart Failure Prediction</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}" style="margin-bottom:16px">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <h2 class="auth-title">Create account</h2>
    <p class="auth-subtitle">Join as a patient or doctor</p>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" type="text" id="username" name="username"
                 placeholder="johndoe" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="role">Role</label>
          <select class="form-control" id="role" name="role" required>
            <option value="patient">Patient</option>
            <option value="doctor">Doctor</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-control" type="email" id="email" name="email"
               placeholder="you@example.com" required/>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" name="password"
                 placeholder="min. 6 characters" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm password</label>
          <input class="form-control" type="password" id="confirm_password"
                 name="confirm_password" placeholder="repeat password" required/>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px; margin-top:4px;">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
